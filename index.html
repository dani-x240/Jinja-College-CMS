<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Download CMS APK</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--accent:#0366d6;--text:#222}

    .card{background:var(--card);box-shadow:0 6px 20px rgba(16,24,40,.08);padding:28px;border-radius:10px;max-width:520px;width:100%;text-align:center}

<body>
  <div class="card">
    <h1>Download CMS App (APK)</h1>

    <a id="downloadBtn" class="btn" href="https://dani-x240.github.io/Jinja-College-CMS/app-release.apk" download>Download APK</a>

    <div class="meta">
      <div id="versionInfo">Required version: <strong id="reqVer">1.0.1</strong></div>
      <div style="margin-top:6px;font-size:12px">If your device blocks installation, enable "Install unknown apps" for your browser.</div>
